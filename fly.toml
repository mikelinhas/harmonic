app = "harmonics"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/"

[[services]]
  protocol = "tcp"
  internal_port = 22222

  [[services.ports]]
    port = 22222

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
